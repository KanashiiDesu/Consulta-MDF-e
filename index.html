<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta MDF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* Estilos gerais */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      background-color: #ffffff;
      padding: 35px 45px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 500px; /* Mantém para desktop e tablets */
      width: 100%;
      text-align: center;
      color: #333333;
    }

    h1 {
      margin-bottom: 35px;
      font-weight: 700;
      font-size: 1.8rem;
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 .fa-file-invoice-dollar {
        margin-right: 12px;
        font-size: 2.2rem;
    }

    .document-section {
        margin-bottom: 30px;
        padding: 20px;
        background-color: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #e9ecef;
    }

    label {
      display: flex;
      align-items: center;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 1.05rem;
      text-align: left;
      color: #005a40;
    }

    label .fa-solid {
        margin-right: 8px;
        color: #004d38;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    .input-wrapper .fa-key {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px 12px 40px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      font-size: 1rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53;
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25);
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background-color: #ffb700;
      color: #3d2800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1.1em;
    }

    button:hover {
      background-color: #e6a200;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    p.info {
      font-size: 0.8rem;
      color: #555555;
      margin-top: 10px;
      text-align: left;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
    }

    p.info .fa-info-circle {
        margin-right: 6px;
        margin-top: 2px;
        color: #007a53;
    }

    .assinatura {
      margin-top: 30px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400;
    }

    /* Estilos para o scanner */
    #scanner-container {
        display: none; /* Escondido por padrão */
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #e9ecef;
        border-radius: 10px;
        background-color: #f8f9fa;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.05);
        position: relative; /* Para posicionar o overlay */
    }

    #video-preview {
        width: 100%;
        max-width: 320px; /* Tamanho fixo para o vídeo, adaptável */
        height: auto;
        border-radius: 8px;
        background-color: #333;
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #scanner-message {
        font-size: 0.9rem;
        color: #666;
        margin-top: 10px;
    }

    #permission-dialog {
        display: none; /* Escondido por padrão */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .dialog-content {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: center;
        max-width: 350px;
        color: #333333;
    }

    .dialog-content h2 {
        margin-bottom: 20px;
        color: #004d38;
    }

    .dialog-content button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 0.95rem;
        border-radius: 8px;
    }

    /* Adição para o "frame" do QR Code */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay-inner {
        width: 60%; /* Ajuste o tamanho da caixa de escaneamento */
        height: 60%;
        border: 4px solid #007a53; /* Cor da borda */
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); /* Efeito de escurecer o restante */
        position: relative;
        overflow: hidden; /* Para o efeito de linha */
    }

    .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #ffb700; /* Cor da linha de scan */
        animation: scan 2s infinite linear;
    }

    @keyframes scan {
        0% {
            top: 0%;
        }
        50% {
            top: 100%;
        }
        100% {
            top: 0%;
        }
    }


    /* Media Queries para responsividade */
    @media (max-width: 600px) {
        .container {
            padding: 25px 20px;
            border-radius: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        h1 .fa-file-invoice-dollar {
            font-size: 1.8rem;
        }

        .document-section {
            padding: 15px;
        }

        label {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        input[type="text"], button {
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        .input-wrapper .fa-key {
            left: 10px;
        }

        .overlay-inner {
            width: 70%;
            height: 70%;
        }
    }

    @media (max-width: 400px) {
        .container {
            padding: 20px 15px;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        h1 .fa-file-invoice-dollar {
            font-size: 1.6rem;
        }

        .overlay-inner {
            width: 80%;
            height: 80%;
        }
    }
  </style>
</head>
<body>
  
  <div class="container">
    <h1><i class="fa-solid fa-file-invoice-dollar"></i>Consulta MDF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe"><i class="fa-solid fa-file-invoice"></i>Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
      <button id="scan-mdfe-qr"><i class="fa-solid fa-camera"></i>Escanear Chave MDF-e</button>
    </div>

    <div id="scanner-container">
        <video id="video-preview" playsinline></video>
        <div class="overlay">
            <div class="overlay-inner">
                <div class="scan-line"></div>
            </div>
        </div>
        <p id="scanner-message">Aguardando câmera...</p>
        <button id="stop-scan-btn"><i class="fa-solid fa-stop-circle"></i>Parar Escaneamento</button>
    </div>
  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <div id="permission-dialog">
      <div class="dialog-content">
          <h2>Permissão da Câmera</h2>
          <p>Este aplicativo precisa da sua permissão para acessar a câmera e escanear a chave do MDF-e.</p>
          <button id="grant-permission-btn">Conceder Permissão</button>
          <button id="deny-permission-btn" style="background-color: #dc3545; color: #fff;">Negar</button>
      </div>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');

      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);

      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const inputMdfe = document.getElementById('chave-mdfe');
    if (inputMdfe) {
      inputMdfe.addEventListener('input', somenteNumeros);
      inputMdfe.addEventListener('paste', handlePaste);
    }

    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const chave = inputMdfe.value.trim();
        if (chave.length === 44) {
          const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
          window.open(url, '_blank');
          inputMdfe.value = '';
        } else {
          alert('Por favor, insira uma chave do MDF-e válida com 44 números.');
        }
      });
    }

    // --- Funcionalidade da Câmera para Leitura de QR Code ---
    const btnScanMdfeQr = document.getElementById('scan-mdfe-qr');
    const scannerContainer = document.getElementById('scanner-container');
    const videoPreview = document.getElementById('video-preview');
    const scannerMessage = document.getElementById('scanner-message');
    const stopScanBtn = document.getElementById('stop-scan-btn');
    const permissionDialog = document.getElementById('permission-dialog');
    const grantPermissionBtn = document.getElementById('grant-permission-btn');
    const denyPermissionBtn = document.getElementById('deny-permission-btn');

    let stream = null;
    let animationFrameId = null;
    let canvas = document.createElement('canvas');
    let ctx = canvas.getContext('2d');
    let scanAttemptCount = 0; // Para depuração
    const MAX_SCAN_ATTEMPTS_BEFORE_FEEDBACK = 60; // 60 frames = aprox 1 segundo

    // Função para extrair a chave do MDF-e de uma URL
    function extractMdfeKeyFromUrl(url) {
      try {
        const urlObj = new URL(url);
        const chMDFe = urlObj.searchParams.get('chMDFe');
        if (chMDFe && chMDFe.length === 44 && /^\d+$/.test(chMDFe)) { // Mais robusto para verificar se é só número
          return chMDFe;
        }
      } catch (e) {
        // Ignora erros de URL inválida
        console.warn("URL inválida ou sem chMDFe:", url, e);
      }
      return null;
    }

    async function startScanner() {
        permissionDialog.style.display = 'none'; // Esconde o popup
        scannerContainer.style.display = 'flex';
        scannerMessage.textContent = 'Iniciando câmera...';
        scanAttemptCount = 0; // Resetar contador

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); // Preferir câmera traseira
            videoPreview.srcObject = stream;
            videoPreview.setAttribute('playsinline', true); // Necessário para iOS
            await videoPreview.play();
            scannerMessage.textContent = 'Posicione o QR Code dentro do quadrado.';
            requestAnimationFrame(tick);
        } catch (err) {
            console.error('Erro ao acessar a câmera:', err);
            scannerMessage.textContent = 'Erro ao acessar a câmera. Verifique as permissões.';
            alert('Não foi possível acessar a câmera. Verifique as permissões do aplicativo.');
            stopScanner(); // Garante que o container do scanner seja escondido
        }
    }

    function tick() {
        if (!stream || !videoPreview.srcObject) { // Verifica se o stream foi interrompido
            return;
        }

        if (videoPreview.readyState === videoPreview.HAVE_ENOUGH_DATA) {
            // Ajustar o canvas para a resolução real do vídeo
            canvas.height = videoPreview.videoHeight;
            canvas.width = videoPreview.videoWidth;
            ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let code = null;
            try {
                code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert", // Tenta ler mesmo em cores invertidas, mas prioriza não inverter
                });
            } catch (e) {
                console.error("Erro na decodificação do jsQR:", e);
                // Não precisa parar, apenas logar o erro interno do jsQR
            }
            
            scanAttemptCount++;

            if (code) {
                let scannedData = code.data;
                let mdfeKey = null;

                // Tenta extrair a chave se for uma URL
                if (scannedData.startsWith('http://') || scannedData.startsWith('https://')) {
                    mdfeKey = extractMdfeKeyFromUrl(scannedData);
                } else if (scannedData.length === 44 && /^\d+$/.test(scannedData)) { // Verifica se é só número
                    // Se não for URL, verifica se já é a chave de 44 dígitos
                    mdfeKey = scannedData;
                }

                if (mdfeKey) {
                    inputMdfe.value = mdfeKey;
                    alert('Chave MDF-e escaneada com sucesso!');
                    stopScanner();
                    btnConsultarMdfe.click(); // Consulta automaticamente após escanear
                    return; // Parar o loop de animação
                } else {
                    scannerMessage.textContent = 'QR Code detectado, mas não é uma chave MDF-e válida. Tente outro.';
                }
            } else {
                // Se nenhum QR Code foi detectado após X tentativas
                if (scanAttemptCount > MAX_SCAN_ATTEMPTS_BEFORE_FEEDBACK) {
                    scannerMessage.textContent = 'Nenhum QR Code detectado. Ajuste a distância, foco e iluminação.';
                } else {
                    scannerMessage.textContent = 'Posicione o QR Code dentro do quadrado.';
                }
            }
        }
        animationFrameId = requestAnimationFrame(tick);
    }

    function stopScanner() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
        scannerContainer.style.display = 'none';
        videoPreview.srcObject = null;
        scanAttemptCount = 0; // Resetar contador ao parar
    }

    btnScanMdfeQr.addEventListener('click', () => {
        // Exibe o popup de permissão
        permissionDialog.style.display = 'flex';
    });

    grantPermissionBtn.addEventListener('click', startScanner);
    denyPermissionBtn.addEventListener('click', () => {
        permissionDialog.style.display = 'none';
        alert('Permissão da câmera negada. Não será possível usar o scanner.');
    });

    stopScanBtn.addEventListener('click', stopScanner);

    // Certifique-se de parar o scanner se o usuário sair da página (em navegadores)
    window.addEventListener('beforeunload', stopScanner);
  </script>
</body>
</html>
