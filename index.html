<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Consulta MDF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/zxing.min.js"></script>
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      background-color: #ffffff;
      padding: 35px 45px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
      color: #333333;
    }

    h1 {
      margin-bottom: 35px;
      font-weight: 700;
      font-size: 1.8rem;
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .document-section {
        margin-bottom: 30px;
        padding: 20px;
        background-color: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #e9ecef;
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex;
      align-items: center;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 1.05rem;
      text-align: left;
      color: #005a40;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    .input-wrapper .fa-key { /* Este ícone é para o campo de entrada em si, não para o rótulo */
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px 12px 40px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      font-size: 1rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53;
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25);
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background-color: #ffb700;
      color: #3d2800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1.1em;
    }

    button:hover {
      background-color: #e6a200;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    p.info {
      font-size: 0.8rem;
      color: #555555;
      margin-top: 10px;
      text-align: left;
      line-height: 1.4;
    }

    p.info .fa-info-circle {
        margin-right: 5px;
        color: #007a53;
    }

    .assinatura {
      margin-top: 30px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400;
    }

    /* Estilos para o stream de vídeo */
    #qr-reader {
      width: 100%;
      height: 250px; /* Ajuste conforme necessário */
      background-color: #000;
      display: flex; /* Mantido para centralizar o vídeo se necessário, mas o vídeo cobrirá */
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden; /* Garante que o vídeo não ultrapasse as bordas arredondadas */
      position: relative;
    }

    #qr-video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Faz o vídeo cobrir a área */
        display: block; /* Remove espaço extra abaixo do vídeo */
    }

    /* O canvas não é mais necessário com ZXing-JS para esta implementação */

    /* Estilos gerais do Modal (reutilizados para Permissão da Câmera e Erro de Leitura) */
    .modal {
      display: none; /* Oculto por padrão */
      position: fixed; /* Permanece no lugar */
      z-index: 100; /* Fica no topo */
      left: 0;
      top: 0;
      width: 100%; /* Largura total */
      height: 100%; /* Altura total */
      overflow: auto; /* Habilita rolagem se necessário */
      background-color: rgba(0,0,0,0.4); /* Preto com opacidade */
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 350px;
      text-align: center;
      color: #333;
    }

    .modal-content h2 {
      margin-bottom: 20px;
      color: #004d38;
      font-size: 1.5rem;
    }

    .modal-content p {
      margin-bottom: 25px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-around;
      gap: 15px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 0;
      width: auto;
      box-shadow: none;
    }

    .modal-buttons .confirm-btn {
      background-color: #007a53;
      color: white;
    }

    .modal-buttons .confirm-btn:hover {
      background-color: #006a4e;
    }

    .modal-buttons .cancel-btn {
      background-color: #e9ecef;
      color: #333;
    }

    .modal-buttons .cancel-btn:hover {
      background-color: #dee2e6;
    }

    /* Estilo específico para o botão do modal de erro */
    #errorModal .confirm-btn {
        background-color: #ffb700;
        color: #3d2800;
    }
    #errorModal .confirm-btn:hover {
        background-color: #e6a200;
    }

</style>
</head>
<body>

  <div class="container">
    <h1>Consulta MDF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
      <button id="scan-code" style="background-color: #007a53; color: #ffffff;"><i class="fa-solid fa-camera"></i>Escanear Código</button>
    </div>

    <div id="qr-reader" style="display: none;">
        <video id="qr-video" autoplay playsinline></video>
        </div>

  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <div id="cameraPermissionModal" class="modal">
    <div class="modal-content">
      <h2>Permissão da Câmera Necessária</h2>
      <p>Para escanear o código, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="confirmCameraAccess">Entendido</button>
        <button class="cancel-btn" id="cancelCameraAccess">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="errorModal" class="modal">
    <div class="modal-content">
      <h2 id="errorModalTitle">Erro na Leitura</h2>
      <p id="errorModalMessage">O conteúdo escaneado não é um código de MDF-e reconhecido.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="tryAgainBtn">Tentar Novamente</button>
        <button class="cancel-btn" id="closeErrorModal">Voltar</button>
      </div>
    </div>
  </div>

<script>
    // Permite apenas números no campo de entrada
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    // Lida com o evento de colar para garantir que apenas números sejam colados e o comprimento seja respeitado
    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');

      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);

      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const campoChaveMdfe = document.getElementById('chave-mdfe');

    if (campoChaveMdfe) {
        campoChaveMdfe.addEventListener('input', somenteNumeros);
        campoChaveMdfe.addEventListener('paste', handlePaste);
    }

    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
          window.open(url, '_blank');
          input.value = ''; // Limpa o campo de entrada após a consulta
        } else {
          alert('Por favor, insira uma chave do MDF-e válida com 44 números.');
        }
      });
    }

    // Lógica do Scanner com ZXing-JS
    const btnScanCode = document.getElementById('scan-code'); // ID do botão atualizado
    const qrReaderDiv = document.getElementById('qr-reader');
    const qrVideo = document.getElementById('qr-video'); // Video element para ZXing

    let codeReader = null; // ZXing code reader instance
    let zxingScanControls = null; // To store controls from ZXing's continuous decode

    // Elementos do Modal
    const cameraPermissionModal = document.getElementById('cameraPermissionModal');
    const confirmCameraAccessBtn = document.getElementById('confirmCameraAccess');
    const cancelCameraAccessBtn = document.getElementById('cancelCameraAccess');

    const errorModal = document.getElementById('errorModal');
    // errorModalTitle and errorModalMessage will be set by showModal

    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const closeErrorModal = document.getElementById('closeErrorModal');

    // Função para exibir um modal genérico
    function showModal(modalElement, title, message, showTryAgain = false) {
        const modalTitleElement = modalElement.querySelector('h2');
        const modalMessageElement = modalElement.querySelector('p');

        if (modalTitleElement && title) modalTitleElement.textContent = title;
        if (modalMessageElement && message) modalMessageElement.textContent = message;

        const currentTryAgainBtn = modalElement.querySelector('.confirm-btn'); // Assuming confirm-btn is try again
        const currentCancelBtn = modalElement.querySelector('.cancel-btn'); // Assuming cancel-btn is close/cancel

        if (modalElement === errorModal) {
             if (currentTryAgainBtn) currentTryAgainBtn.style.display = showTryAgain ? 'flex' : 'none'; // Use flex for button alignment
        }
        modalElement.style.display = 'flex';
    }

    // Função para esconder um modal genérico
    function hideModal(modalElement) {
        modalElement.style.display = 'none';
    }

    // Função para redefinir o estado inicial (mostrar campo de entrada, esconder scanner)
    function resetToInitialState() {
        stopCamera();
        document.querySelector('.document-section').style.display = 'block';
        qrReaderDiv.style.display = 'none';
        hideModal(cameraPermissionModal);
        hideModal(errorModal);
        if(campoChaveMdfe) campoChaveMdfe.value = ''; // Garante que o campo esteja limpo
    }

    // Função para iniciar o scan da câmera com ZXing-JS
    async function startCameraScan() {
        document.querySelector('.document-section').style.display = 'none';
        qrReaderDiv.style.display = 'flex';
        qrVideo.style.display = 'block'; // Make sure video element is visible

        if (!codeReader) {
            codeReader = new ZXing.BrowserMultiFormatReader();
        }
        zxingScanControls = null; // Reset controls for a new session

        try {
            console.log('Iniciando escaneamento com ZXing...');
            codeReader.decodeFromVideoDevice(undefined, qrVideo.id, (result, error, controls) => {
                if (controls && !zxingScanControls) {
                    zxingScanControls = controls; // Store controls for potential manual stop
                }

                if (result) {
                    console.log("Código encontrado:", result.text, "Formato:", result.format.toString());
                    if (zxingScanControls) {
                        zxingScanControls.stop(); // Stop this specific scanning session
                        zxingScanControls = null;
                    }
                    handleScannedValue(result.text.trim());
                } else if (error) {
                    if (error instanceof ZXing.NotFoundException) {
                        // Normal, no code found in this frame, continue scanning
                    } else {
                        console.error('Erro no escaneamento ZXing:', error);
                        if (zxingScanControls) {
                            zxingScanControls.stop();
                            zxingScanControls = null;
                        }
                        let errorTitle = 'Erro de Leitura!';
                        let errorMessage = 'Ocorreu um erro ao tentar ler o código. Por favor, tente novamente.';

                        if (error.name === 'NotAllowedError') {
                            errorTitle = 'Permissão Negada!';
                            errorMessage = 'Acesso à câmera negado. Por favor, permita o acesso nas configurações do seu navegador.';
                        } else if (error.name === 'NotFoundError' || (error.message && error.message.toLowerCase().includes("requested device not found"))) {
                            errorTitle = 'Câmera Não Encontrada!';
                            errorMessage = 'Nenhuma câmera foi encontrada. Verifique se seu dispositivo possui uma câmera funcional.';
                        } else if (error.name === 'NotReadableError' || (error.message && error.message.toLowerCase().includes("could not start video source")) || (error.message && error.message.toLowerCase().includes("already in use"))){
                            errorTitle = 'Erro de Câmera!';
                            errorMessage = 'Não foi possível acessar a câmera. Pode estar em uso por outro aplicativo/aba ou bloqueada. Feche outros usos e tente novamente.';
                        } else if (error instanceof ZXing.FormatException || error instanceof ZXing.ChecksumException) {
                            errorMessage = 'O código escaneado parece inválido ou danificado. Tente alinhar melhor ou usar um código diferente.';
                        }
                        showModal(errorModal, errorTitle, errorMessage, true);
                    }
                }
            });
        } catch (initialError) {
            console.error('Erro ao iniciar o scanner ZXing:', initialError);
            stopCamera(); // Ensure everything is reset
            showModal(errorModal, 'Erro Crítico no Scanner', 'Falha ao iniciar o scanner: ' + initialError.message, true);
        }
    }

    if (btnScanCode) {
        btnScanCode.addEventListener('click', async () => {
            try {
                const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                if (permissionStatus.state === 'granted') {
                    startCameraScan();
                } else {
                     showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.');
                }
            } catch (e) {
                console.warn("navigator.permissions.query não suportado ou erro. Mostrando modal de permissão.", e);
                showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.');
            }
        });
    }


    confirmCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        startCameraScan();
    });

    cancelCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        resetToInitialState();
        // alert('Você cancelou o acesso à câmera.'); // Optional feedback
    });

    tryAgainBtn.addEventListener('click', () => {
        hideModal(errorModal);
        startCameraScan(); // Tenta escanear novamente
    });

    closeErrorModal.addEventListener('click', () => {
        hideModal(errorModal);
        resetToInitialState(); // Volta ao estado inicial
    });


    // Lida com o valor escaneado (chave MDF-e ou URL QR Code)
    function handleScannedValue(value) {
      let chaveMdfe = '';
      const cleanedValue = value.replace(/\s+/g, ''); // Remove espaços em branco

      // Verifica se é uma chave de 44 dígitos diretamente
      if (/^\d{44}$/.test(cleanedValue)) {
        chaveMdfe = cleanedValue;
      }
      // Verifica se é uma URL (comum em QR Codes) contendo o parâmetro chMDFe
      else if (cleanedValue.includes('chMDFe=')) {
        try {
          // Tenta extrair de uma string que pode ser uma URL completa ou parcial
          const paramsStr = cleanedValue.includes('?') ? cleanedValue.split('?')[1] : cleanedValue;
          const urlParams = new URLSearchParams(paramsStr);
          chaveMdfe = urlParams.get('chMDFe');
        } catch (e) {
          console.error("Erro ao parsear parâmetros da URL do código:", e, "Valor:", cleanedValue);
          chaveMdfe = null;
        }
      }

      if (chaveMdfe && /^\d{44}$/.test(chaveMdfe)) {
        const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chaveMdfe}&tpAmb=1`;
        window.open(url, '_blank');
        // campoChaveMdfe.value = chaveMdfe; // Opcional: preencher o campo
        resetToInitialState();
      } else {
        // Scanner já foi parado pela callback do ZXing antes de chamar handleScannedValue
        showModal(errorModal,
                  'Código Inválido',
                  'O código lido não contém uma chave de MDF-e de 44 números ou uma URL reconhecida. Verifique o código e tente novamente.',
                  true); // true para mostrar "Tentar Novamente"
      }
    }

    // Função para parar o stream da câmera e resetar o leitor ZXing
    function stopCamera() {
      if (zxingScanControls) { // Se houver controles de uma sessão ativa
        zxingScanControls.stop();
        zxingScanControls = null;
        console.log("Escaneamento ZXing interrompido via controles.");
      }
      if (codeReader) {
        codeReader.reset(); // Reseta o leitor ZXing, que para a câmera
        console.log("Leitor ZXing resetado.");
      }
      // qrVideo.style.display = 'none'; // Esconder o vídeo é feito em resetToInitialState ao esconder qrReaderDiv
    }

    // Quando o usuário navega para fora ou fecha a página, para a câmera
    window.addEventListener('beforeunload', stopCamera);

</script>
</body>
</html>
