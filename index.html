<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta MDF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 10px; /* Ajustado para telas menores */
    }

    .container {
      background-color: #ffffff;
      padding: 25px 20px; /* Ajustado para telas menores */
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
      color: #333333;
      margin: 10px 0; /* Adicionada margem vertical */
    }

    h1 {
      margin-bottom: 25px; /* Ajustado */
      font-weight: 700;
      font-size: 1.6rem; /* Ajustado */
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .document-section {
        margin-bottom: 20px; /* Ajustado */
        padding: 15px; /* Ajustado */
        background-color: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #e9ecef;
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex;
      align-items: center;
      font-weight: 600;
      margin-bottom: 10px; /* Ajustado */
      font-size: 1rem; /* Ajustado */
      text-align: left;
      color: #005a40;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 15px; /* Ajustado */
    }

    .input-wrapper .fa-key {
        position: absolute;
        left: 12px; /* Ajustado */
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.85rem; /* Ajustado */
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 15px 10px 35px; /* Ajustado */
      border-radius: 8px;
      border: 1px solid #ced4da;
      font-size: 0.95rem; /* Ajustado */
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53;
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25);
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px; /* Ajustado */
      margin-top: 10px;
      padding: 10px 20px; /* Ajustado */
      font-size: 0.95rem; /* Ajustado */
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background-color: #ffb700;
      color: #3d2800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1em; /* Ajustado */
    }

    button:hover {
      background-color: #e6a200;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    .assinatura {
      margin-top: 25px; /* Ajustado */
      font-size: 0.8rem; /* Ajustado */
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400;
    }

    #qr-reader {
      width: 100%;
      height: 220px; /* Altura ajustada para mobile */
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 15px; /* Ajustado */
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #qr-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000; /* Aumentado para melhor sobreposição */
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5); /* Fundo mais escuro */
      justify-content: center;
      align-items: center;
      padding: 10px; /* Padding para o overlay do modal */
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 20px; /* Padding base do conteúdo do modal */
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 90%; /* Responsivo em telas pequenas */
      max-width: 350px; /* Mantido o max-width original */
      text-align: center;
      color: #333;
    }

    .modal-content h2 {
      margin-bottom: 15px; /* Ajustado */
      color: #004d38;
      font-size: 1.3rem; /* Ajustado */
    }

    .modal-content p {
      margin-bottom: 20px; /* Ajustado */
      line-height: 1.5;
      font-size: 0.9rem; /* Ajustado */
      text-align: left; /* Mantido para melhor leitura de mensagens mais longas */
    }

    .modal-buttons {
      display: flex;
      justify-content: space-around; /* Mantido o original, bom para 2 botões */
      gap: 10px; /* Ajustado */
      margin-top: 10px; /* Ajustado */
    }

    .modal-buttons button {
      flex: 1;
      padding: 8px 12px; /* Ajustado */
      border-radius: 8px;
      font-size: 0.9rem; /* Ajustado */
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 0;
      width: auto;
      box-shadow: none;
    }
    
    .modal-buttons .confirm-btn {
      background-color: #007a53;
      color: white;
    }
    .modal-buttons .confirm-btn:hover {
      background-color: #006a4e;
    }

    .modal-buttons .cancel-btn {
      background-color: #e9ecef;
      color: #333;
    }
    .modal-buttons .cancel-btn:hover {
      background-color: #dee2e6;
    }

    #errorModal .modal-buttons .confirm-btn { /* Específico para o errorModal do scanner */
        background-color: #ffb700;
        color: #3d2800;
    }
    #errorModal .modal-buttons .confirm-btn:hover {
        background-color: #e6a200;
    }

    /* --- MEDIA QUERIES PARA RESPONSIVIDADE --- */
    @media (min-width: 600px) { /* Estilos para telas maiores (tablets, desktops) */
        body {
            padding: 20px; /* Restaura padding original do body */
        }
        .container {
            padding: 35px 45px; /* Restaura padding original do container */
        }
        h1 {
            font-size: 1.8rem; /* Restaura tamanho original */
            margin-bottom: 35px; /* Restaura margem original */
        }
        .document-section {
            padding: 20px; /* Restaura padding original */
            margin-bottom: 30px; /* Restaura margem original */
        }
        label {
            font-size: 1.05rem; /* Restaura tamanho original */
            margin-bottom: 12px; /* Restaura margem original */
        }
        .input-wrapper {
            margin-bottom: 20px; /* Restaura margem original */
        }
        .input-wrapper .fa-key {
            font-size: 0.9rem; /* Restaura tamanho original */
            left: 15px; /* Restaura posição original */
        }
        input[type="text"] {
            padding: 12px 15px 12px 40px; /* Restaura padding original */
            font-size: 1rem; /* Restaura tamanho original */
        }
        button {
            padding: 12px 25px; /* Restaura padding original */
            font-size: 1rem; /* Restaura tamanho original */
            gap: 10px; /* Restaura gap original */
        }
        button .fa-solid {
            font-size: 1.1em; /* Restaura tamanho original */
        }
        .assinatura {
            margin-top: 30px; /* Restaura margem original */
            font-size: 0.85rem; /* Restaura tamanho original */
        }
        #qr-reader {
            height: 250px; /* Restaura altura original */
            margin-top: 20px; /* Restaura margem original */
        }
        .modal-content {
            padding: 30px; /* Restaura padding original */
        }
        .modal-content h2 {
            font-size: 1.5rem; /* Restaura tamanho original */
            margin-bottom: 20px; /* Restaura margem original */
        }
        .modal-content p {
            font-size: 0.95rem; /* Restaura tamanho original */
            margin-bottom: 25px; /* Restaura margem original */
        }
        .modal-buttons {
            gap: 15px; /* Restaura gap original */
            margin-top: 0; /* Restaura margem original (se era o caso) ou ajuste fino */
        }
        .modal-buttons button {
            padding: 10px 15px; /* Restaura padding original */
            font-size: 0.95rem; /* Restaura tamanho original */
        }
    }

    @media (max-width: 400px) { /* Ajustes finos para telas muito pequenas */
        body {
            padding: 5px;
        }
        .container {
            padding: 20px 10px; /* Padding ainda menor */
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        input[type="text"] {
            font-size: 0.9rem;
            padding: 10px 10px 10px 30px; /* Padding esquerdo menor para ícone */
        }
        .input-wrapper .fa-key {
            font-size: 0.8rem;
            left: 10px;
        }
        button {
            font-size: 0.9rem;
            padding: 10px 15px;
        }
        #qr-reader {
            height: 180px; /* Altura ainda menor para scanner */
        }
        .modal-content {
            padding: 15px;
            width: 95%;
        }
        .modal-content h2 {
            font-size: 1.2rem;
        }
        .modal-content p {
            font-size: 0.85rem;
        }
        .modal-buttons { /* Empilha os botões do modal */
            flex-direction: column;
            gap: 8px;
        }
        .modal-buttons button {
            width: 100%; /* Botões ocupam largura total */
        }
    }

</style>
</head>
<body>

  <div class="container">
    <h1>Consulta MDF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
      <button id="scan-code" style="background-color: #007a53; color: #ffffff;"><i class="fa-solid fa-camera"></i>Escanear Código</button>
    </div>

    <div id="qr-reader" style="display: none;">
        <video id="qr-video" autoplay playsinline></video>
    </div>

  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <div id="cameraPermissionModal" class="modal">
    <div class="modal-content">
      <h2>Permissão da Câmera Necessária</h2>
      <p>Para escanear o código, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="confirmCameraAccess">Entendido</button>
        <button class="cancel-btn" id="cancelCameraAccess">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="errorModal" class="modal">
    <div class="modal-content">
      <h2 id="errorModalTitle">Erro na Leitura</h2>
      <p id="errorModalMessage">O conteúdo escaneado não é um código de MDF-e reconhecido.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="tryAgainBtn">Tentar Novamente</button>
        <button class="cancel-btn" id="closeErrorModal">Voltar</button>
      </div>
    </div>
  </div>

<script>
    // Funções de manipulação de input
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');
      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);
      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const campoChaveMdfe = document.getElementById('chave-mdfe');
    if (campoChaveMdfe) {
        campoChaveMdfe.addEventListener('input', somenteNumeros);
        campoChaveMdfe.addEventListener('paste', handlePaste);
    }

    // Consulta manual
    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const modeloDocumento = chave.substring(20, 22);
          if (modeloDocumento === '58') {
            const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
            window.open(url, '_blank');
            input.value = '';
          } else {
            // Usando showModal para consistência, mesmo que o modal errorModal seja usado.
            // Idealmente, você teria um modal genérico se quisesse o mesmo estilo para todos os erros.
            // Por enquanto, mantendo o alert para diferenciar dos erros de scan.
            alert(`A chave inserida (modelo ${modeloDocumento}) não é de um MDF-e (modelo 58). Verifique a chave.`);
            input.value = ''; // Limpa o campo após o alerta
          }
        } else {
          alert('Por favor, insira uma chave de acesso válida com 44 números.');
          input.value = ''; // Limpa o campo após o alerta
        }
      });
    }

    // Elementos do Scanner e Modais
    const btnScanCode = document.getElementById('scan-code');
    const qrReaderDiv = document.getElementById('qr-reader');
    const qrVideo = document.getElementById('qr-video');

    let codeReader = null; 
    let zxingScanControls = null; 

    const cameraPermissionModal = document.getElementById('cameraPermissionModal');
    const confirmCameraAccessBtn = document.getElementById('confirmCameraAccess');
    const cancelCameraAccessBtn = document.getElementById('cancelCameraAccess');

    const errorModal = document.getElementById('errorModal'); // Modal para erros de scan e validação de código escaneado
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const closeErrorModal = document.getElementById('closeErrorModal');

    // Funções de controle de Modal (para cameraPermissionModal e errorModal)
    function showModal(modalElement, title, message, showTryAgain = false) {
        const modalTitleElement = modalElement.querySelector('h2');
        const modalMessageElement = modalElement.querySelector('p');
        if (modalTitleElement && title) modalTitleElement.textContent = title;
        if (modalMessageElement && message) modalMessageElement.innerHTML = message.replace(/\n/g, '<br>'); // Suporta quebras de linha

        const currentTryAgainBtn = modalElement.querySelector('#tryAgainBtn'); // Específico para errorModal
        if (modalElement === errorModal && currentTryAgainBtn) {
            currentTryAgainBtn.style.display = showTryAgain ? 'flex' : 'none';
        }
        modalElement.style.display = 'flex';
    }

    function hideModal(modalElement) {
        modalElement.style.display = 'none';
    }

    function resetToInitialState() {
        stopCamera();
        // Garante que a seção de input/botões do MDF-e esteja visível
        const docSection = campoChaveMdfe.closest('.document-section');
        if (docSection) docSection.style.display = 'block';
        
        qrReaderDiv.style.display = 'none';
        hideModal(cameraPermissionModal);
        hideModal(errorModal);
        if(campoChaveMdfe) campoChaveMdfe.value = '';
    }

    // Lógica de Escaneamento com ZXing-JS
    async function startCameraScan() {
        // Esconde a seção de input/botões do MDF-e ao iniciar o scanner
        const docSection = campoChaveMdfe.closest('.document-section');
        if (docSection) docSection.style.display = 'none';

        qrReaderDiv.style.display = 'flex';
        qrVideo.style.display = 'block';

        if (typeof ZXing === 'undefined') {
            console.error("ZXing library is not loaded!");
            showModal(errorModal, "Erro Crítico", "A biblioteca de escaneamento (ZXing) não foi carregada.<br>Verifique a conexão e recarregue.", false);
            resetToInitialState();
            return;
        }

        if (!codeReader) {
            try {
                codeReader = new ZXing.BrowserMultiFormatReader();
            } catch (e) {
                console.error("Falha ao instanciar ZXing.BrowserMultiFormatReader():", e);
                showModal(errorModal, "Erro Crítico", "Falha ao iniciar o leitor de código: " + e.message, false);
                resetToInitialState();
                return;
            }
        }
        zxingScanControls = null;

        try {
            console.log('Iniciando escaneamento com ZXing...');
            codeReader.decodeFromVideoDevice(undefined, qrVideo.id, (result, error, controls) => {
                if (controls && !zxingScanControls) {
                    zxingScanControls = controls;
                }

                if (result) {
                    console.log("Código encontrado:", result.text, "Formato:", result.format.toString());
                    if (zxingScanControls) {
                        zxingScanControls.stop();
                        zxingScanControls = null;
                    }
                    handleScannedValue(result.text.trim());
                } else if (error) {
                    if (error instanceof ZXing.NotFoundException) {
                        // Normal
                    } else {
                        console.error('Erro no escaneamento ZXing:', error.name, error.message, error);
                        if (zxingScanControls) {
                            zxingScanControls.stop();
                            zxingScanControls = null;
                        }
                        let errorTitle = 'Erro de Leitura!';
                        let errorMessage = 'Ocorreu um erro ao tentar ler o código.<br>Por favor, tente novamente.';

                        if (error.name === 'NotAllowedError') {
                            errorTitle = 'Permissão Negada!';
                            errorMessage = 'Acesso à câmera negado.<br>Por favor, permita o acesso nas configurações do seu navegador.';
                        } else if (error.name === 'NotFoundError' || (error.message && error.message.toLowerCase().includes("requested device not found"))) {
                            errorTitle = 'Câmera Não Encontrada!';
                            errorMessage = 'Nenhuma câmera foi encontrada.<br>Verifique se seu dispositivo possui uma câmera funcional.';
                        } else if (error.name === 'NotReadableError' || (error.message && (error.message.toLowerCase().includes("could not start video source") || error.message.toLowerCase().includes("already in use") || error.message.toLowerCase().includes("permission denied by system")) ) ){
                            errorTitle = 'Erro de Câmera!';
                            errorMessage = 'Não foi possível acessar a câmera.<br>Pode estar em uso por outro aplicativo/aba, bloqueada pelo sistema ou não ter permissão.<br>Verifique e tente novamente.';
                        } else if (error instanceof ZXing.FormatException || error instanceof ZXing.ChecksumException) {
                            errorMessage = 'O código escaneado parece inválido ou danificado.<br>Tente alinhar melhor ou usar um código diferente.';
                        } else if (error.name === 'SecurityError' && error.message.toLowerCase().includes('secure context')) {
                            errorTitle = 'Erro de Segurança!';
                            errorMessage = 'O acesso à câmera só é permitido em um contexto seguro (HTTPS).<br>Verifique se a página está sendo acessada via https://';
                        }
                        showModal(errorModal, errorTitle, errorMessage, true); // true para "Tentar Novamente"
                    }
                }
            });
        } catch (initialError) {
            console.error('Erro ao iniciar o scanner ZXing (setup):', initialError);
            stopCamera();
            showModal(errorModal, 'Erro Crítico no Scanner', 'Falha ao configurar o scanner: ' + initialError.message, true);
            resetToInitialState();
        }
    }

    if (btnScanCode) {
        btnScanCode.addEventListener('click', async () => {
            if (typeof ZXing === 'undefined') {
                 console.error("ZXing library is not loaded before scan button click!");
                 showModal(errorModal, "Erro Crítico", "A biblioteca de escaneamento (ZXing) não foi carregada.<br>Verifique a conexão e recarregue.", false);
                 return;
            }
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                    if (permissionStatus.state === 'granted') {
                        startCameraScan();
                    } else {
                         showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.<br>Por favor, clique em "Permitir" na solicitação do navegador.');
                    }
                } else { 
                    console.warn("navigator.permissions.query não suportado. Tentando acesso direto após modal.");
                    showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.<br>Por favor, clique em "Permitir".');
                }
            } catch (e) {
                console.warn("Erro ao verificar permissões da câmera, mostrando modal:", e);
                showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.');
            }
        });
    }

    confirmCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        startCameraScan();
    });

    cancelCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        resetToInitialState();
    });

    tryAgainBtn.addEventListener('click', () => {
        hideModal(errorModal);
        startCameraScan(); 
    });

    closeErrorModal.addEventListener('click', () => {
        hideModal(errorModal);
        resetToInitialState();
    });

    function handleScannedValue(value) {
        let chaveFiscal = ''; 
        const cleanedValue = value.replace(/\s+/g, '');

        if (/^\d{44}$/.test(cleanedValue)) {
            chaveFiscal = cleanedValue;
        } else if (cleanedValue.includes('chMDFe=') || cleanedValue.includes('chCTe=') || cleanedValue.includes('chNFe=')) { // Procura por chaves comuns
            try {
                const paramsStr = cleanedValue.includes('?') ? cleanedValue.split('?')[1] : cleanedValue;
                const urlParams = new URLSearchParams(paramsStr);
                if (urlParams.has('chMDFe')) {
                    chaveFiscal = urlParams.get('chMDFe');
                } else if (urlParams.has('chCTe')) { // Adicionado para robustez, embora não usado para redirecionamento
                    chaveFiscal = urlParams.get('chCTe');
                } else if (urlParams.has('chNFe')) { // Adicionado para robustez
                    chaveFiscal = urlParams.get('chNFe');
                }
                if (chaveFiscal) chaveFiscal = chaveFiscal.replace(/\s+/g, '');

            } catch (e) {
                console.error("Erro ao parsear parâmetros da URL do código:", e, "Valor:", cleanedValue);
                chaveFiscal = null;
            }
        }

        if (chaveFiscal && /^\d{44}$/.test(chaveFiscal)) {
            const modeloDocumento = chaveFiscal.substring(20, 22);

            if (modeloDocumento === '58') { // Modelo 58 é MDF-e
                const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chaveFiscal}&tpAmb=1`;
                window.open(url, '_blank');
                resetToInitialState(); // Volta ao estado inicial após abrir o link
            } else { 
                // Para qualquer outro modelo escaneado que não seja 58
                let nomeDocumento = `Documento (modelo ${modeloDocumento})`;
                if(modeloDocumento === '57') nomeDocumento = 'CT-e (Conhecimento de Transporte)';
                else if(modeloDocumento === '55') nomeDocumento = 'NF-e (Nota Fiscal)';

                showModal(errorModal,
                          'Documento Não Suportado',
                          `Este é um código de ${nomeDocumento}.<br>Este consultor é específico para MDF-e (modelo 58).`,
                          true); // Permite "Tentar Novamente" o scan
            }
        } else { 
            showModal(errorModal,
                      'Código Inválido',
                      'O código lido não parece ser uma chave de acesso válida (44 dígitos) ou URL reconhecida.<br>Verifique o código e tente novamente.',
                      true);
        }
    }

    function stopCamera() {
      if (zxingScanControls) {
        zxingScanControls.stop();
        zxingScanControls = null;
        console.log("Escaneamento ZXing interrompido via controles.");
      }
      if (codeReader) {
        try {
            codeReader.reset(); 
            console.log("Leitor ZXing resetado.");
        } catch (e) {
            console.error("Erro ao resetar o leitor ZXing:", e);
        }
      }
      if (qrVideo) {
        qrVideo.pause();
        if (qrVideo.srcObject) {
            qrVideo.srcObject.getTracks().forEach(track => track.stop());
        }
        qrVideo.srcObject = null;
      }
    }

    window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
