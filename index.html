<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Consulta MDF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      background-color: #ffffff; 
      padding: 35px 45px; 
      border-radius: 15px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
      max-width: 500px; 
      width: 100%;
      text-align: center;
      color: #333333;
    }

    h1 {
      margin-bottom: 35px; 
      font-weight: 700;
      font-size: 1.8rem; 
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .document-section {
        margin-bottom: 30px;
        padding: 20px;
        background-color: #f8f9fa; 
        border-radius: 10px;
        border: 1px solid #e9ecef; 
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex; 
      align-items: center;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 1.05rem; 
      text-align: left;
      color: #005a40; 
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    .input-wrapper .fa-key { /* Este ícone é para o campo de entrada em si, não para o rótulo */
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px 12px 40px; 
      border-radius: 8px;
      border: 1px solid #ced4da; 
      font-size: 1rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53; 
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25); 
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px; 
      margin-top: 10px;
      padding: 12px 25px; 
      font-size: 1rem; 
      font-weight: 600; 
      border: none;
      border-radius: 8px;
      background-color: #ffb700; 
      color: #3d2800; 
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1.1em; 
    }

    button:hover {
      background-color: #e6a200; 
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    p.info {
      font-size: 0.8rem; 
      color: #555555;
      margin-top: 10px; 
      text-align: left;
      line-height: 1.4;
    }

    p.info .fa-info-circle {
        margin-right: 5px;
        color: #007a53;
    }

    .assinatura {
      margin-top: 30px; 
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7); 
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400; 
    }

    /* Estilos para o stream de vídeo e canvas */
    #qr-reader {
      width: 100%;
      height: 250px; /* Ajuste conforme necessário */
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.2rem;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #qr-video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Faz o vídeo cobrir a área */
        display: block; /* Remove espaço extra abaixo do vídeo */
    }

    #qr-canvas {
        display: none; /* Oculto, usado para processar os frames */
    }

    /* Estilos gerais do Modal (reutilizados para Permissão da Câmera e Erro de Leitura) */
    .modal {
      display: none; /* Oculto por padrão */
      position: fixed; /* Permanece no lugar */
      z-index: 100; /* Fica no topo */
      left: 0;
      top: 0;
      width: 100%; /* Largura total */
      height: 100%; /* Altura total */
      overflow: auto; /* Habilita rolagem se necessário */
      background-color: rgba(0,0,0,0.4); /* Preto com opacidade */
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 350px;
      text-align: center;
      color: #333;
    }

    .modal-content h2 {
      margin-bottom: 20px;
      color: #004d38;
      font-size: 1.5rem;
    }

    .modal-content p {
      margin-bottom: 25px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-around;
      gap: 15px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 0;
      width: auto;
      box-shadow: none;
    }

    .modal-buttons .confirm-btn {
      background-color: #007a53;
      color: white;
    }

    .modal-buttons .confirm-btn:hover {
      background-color: #006a4e;
    }

    .modal-buttons .cancel-btn {
      background-color: #e9ecef;
      color: #333;
    }

    .modal-buttons .cancel-btn:hover {
      background-color: #dee2e6;
    }

    /* Estilo específico para o botão do modal de erro */
    #errorModal .confirm-btn {
        background-color: #ffb700;
        color: #3d2800;
    }
    #errorModal .confirm-btn:hover {
        background-color: #e6a200;
    }

  </style>
</head>
<body>
  
  <div class="container">
    <h1>Consulta MDF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
      <button id="scan-qrcode" style="background-color: #007a53; color: #ffffff;"><i class="fa-solid fa-camera"></i>Escanear QR Code</button>
    </div>

    <div id="qr-reader" style="display: none;">
        <video id="qr-video" autoplay playsinline></video>
        <canvas id="qr-canvas"></canvas>
    </div>
    
  </div>

  <div class="assinatura">by Thalis Gomes</div>

  <div id="cameraPermissionModal" class="modal">
    <div class="modal-content">
      <h2>Permissão da Câmera Necessária</h2>
      <p>Para escanear o QR Code, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="confirmCameraAccess">Entendido</button>
        <button class="cancel-btn" id="cancelCameraAccess">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="errorModal" class="modal">
    <div class="modal-content">
      <h2 id="errorModalTitle">Erro na Leitura</h2>
      <p id="errorModalMessage">O conteúdo escaneado não é um QR Code de MDF-e reconhecido.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="tryAgainBtn">Tentar Novamente</button>
        <button class="cancel-btn" id="closeErrorModal">Voltar</button>
      </div>
    </div>
  </div>

  <script>
    // Permite apenas números no campo de entrada
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    // Lida com o evento de colar para garantir que apenas números sejam colados e o comprimento seja respeitado
    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');

      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);

      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const campoChaveMdfe = document.getElementById('chave-mdfe');

    if (campoChaveMdfe) {
        campoChaveMdfe.addEventListener('input', somenteNumeros);
        campoChaveMdfe.addEventListener('paste', handlePaste);
    }

    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
          window.open(url, '_blank');
          input.value = ''; // Limpa o campo de entrada após a consulta
        } else {
          alert('Por favor, insira uma chave do MDF-e válida com 44 números.');
        }
      });
    }

    // Lógica do Scanner de QR Code
    const btnScanQrCode = document.getElementById('scan-qrcode');
    const qrReaderDiv = document.getElementById('qr-reader');
    const qrVideo = document.getElementById('qr-video');
    const qrCanvas = document.getElementById('qr-canvas');
    // A div qrMessage foi removida do HTML, então não precisamos mais dela aqui.
    let stream; // Armazena o stream da câmera
    let animationFrameId; // Armazena o ID do frame de animação para parar o loop
    let canvasContext; // Contexto 2D do canvas para desenhar frames do vídeo

    // Elementos do Modal
    const cameraPermissionModal = document.getElementById('cameraPermissionModal');
    const confirmCameraAccessBtn = document.getElementById('confirmCameraAccess');
    const cancelCameraAccessBtn = document.getElementById('cancelCameraAccess');

    const errorModal = document.getElementById('errorModal');
    const errorModalTitle = document.getElementById('errorModalTitle');
    const errorModalMessage = document.getElementById('errorModalMessage');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const closeErrorModal = document.getElementById('closeErrorModal');

    // Função para exibir um modal genérico
    function showModal(modalElement, title, message, showTryAgain = false) {
        // Garante que os elementos de título e mensagem dentro do modal sejam direcionados corretamente
        const modalTitleElement = modalElement.querySelector('h2');
        const modalMessageElement = modalElement.querySelector('p');

        if (modalTitleElement && title) modalTitleElement.textContent = title; 
        if (modalMessageElement && message) modalMessageElement.textContent = message; 
        
        if (modalElement === errorModal) {
            tryAgainBtn.style.display = showTryAgain ? 'block' : 'none';
        }
        modalElement.style.display = 'flex';
    }

    // Função para esconder um modal genérico
    function hideModal(modalElement) {
        modalElement.style.display = 'none';
    }

    // Função para redefinir o estado inicial (mostrar campo de entrada, esconder scanner)
    function resetToInitialState() {
        stopCamera();
        document.querySelector('.document-section').style.display = 'block';
        qrReaderDiv.style.display = 'none';
        hideModal(cameraPermissionModal);
        hideModal(errorModal);
        campoChaveMdfe.value = ''; // Garante que o campo esteja limpo ao redefinir
    }

    // Função para iniciar o scan da câmera
    async function startCameraScan() {
        document.querySelector('.document-section').style.display = 'none';
        qrReaderDiv.style.display = 'flex';
        // Nenhuma mensagem de texto é mostrada sobre o vídeo da câmera agora.

        // Inicializa canvasContext aqui, uma vez que qrCanvas está garantido de estar no DOM
        if (!canvasContext && qrCanvas) {
            canvasContext = qrCanvas.getContext('2d');
        }

        try {
            // Solicita acesso à câmera
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            qrVideo.srcObject = stream;
            qrVideo.setAttribute('playsinline', true); // Necessário para iOS
            qrVideo.play();
            animationFrameId = requestAnimationFrame(tick); // Inicia o loop de leitura
        } catch (err) {
            console.error('Erro ao acessar a câmera:', err);
            stopCamera(); // Para a câmera imediatamente em caso de erro
            let errorMessage = 'Não foi possível acessar a câmera. Por favor, verifique as permissões do seu navegador e tente novamente.';
            if (err.name === 'NotAllowedError') {
                errorMessage = 'Acesso à câmera negado. Por favor, permita o acesso à câmera nas configurações do seu navegador para usar o scanner.';
            } else if (err.name === 'NotFoundError') {
                errorMessage = 'Nenhuma câmera encontrada. Por favor, certifique-se de que seu dispositivo tenha uma câmera e que ela esteja funcionando.';
            } else if (err.name === 'AbortError') {
                errorMessage = 'A câmera foi bloqueada por outro aplicativo ou dispositivo. Por favor, feche outros aplicativos que usam a câmera e tente novamente.';
            } else if (err.name === 'NotReadableError') { // Comum se a câmera já estiver em uso por outra aba/app
                errorMessage = 'A câmera está sendo usada por outro aplicativo ou aba. Feche o outro aplicativo/aba e tente novamente.';
            }
            showModal(errorModal, 'Erro de Câmera!', errorMessage, true); // Exibe o modal de erro com opção "Tentar Novamente"
        }
    }

    btnScanQrCode.addEventListener('click', async () => {
        // Verifica se a permissão já foi concedida
        try {
            const permissionStatus = await navigator.permissions.query({ name: 'camera' });
            if (permissionStatus.state === 'granted') {
                startCameraScan(); // Inicia o scan diretamente
            } else {
                showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o QR Code, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.'); 
            }
        } catch (e) {
            // navigator.permissions pode não ser totalmente suportado em todos os navegadores mais antigos/menos comuns
            console.warn("navigator.permissions.query não totalmente suportado ou encontrou um erro, usando chamada direta a getUserMedia após o modal.", e);
            showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o QR Code, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.');
        }
    });

    confirmCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        startCameraScan();
    });

    cancelCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        resetToInitialState();
        alert('Você cancelou o acesso à câmera.');
    });

    tryAgainBtn.addEventListener('click', () => {
        hideModal(errorModal);
        startCameraScan(); // Tenta escanear novamente
    });

    closeErrorModal.addEventListener('click', () => {
        hideModal(errorModal);
        resetToInitialState(); // Volta ao estado inicial
    });

    // Função principal de loop para processar frames de vídeo
    function tick() {
      // Garante que canvasContext esteja definido antes de tentar usá-lo
      if (!canvasContext) {
          console.error("canvasContext não foi inicializado. Parando o loop de tick.");
          stopCamera();
          return; // Para o loop se o contexto estiver faltando
      }

      if (qrVideo.readyState === qrVideo.HAVE_ENOUGH_DATA) {
        qrCanvas.hidden = false;
        qrCanvas.height = qrVideo.videoHeight;
        qrCanvas.width = qrVideo.videoWidth;
        canvasContext.drawImage(qrVideo, 0, 0, qrCanvas.width, qrCanvas.height);
        const imageData = canvasContext.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'dontInvert',
        });

        if (code) {
          console.log('QR Code encontrado:', code.data);
          const scannedValue = code.data.trim();
          handleScannedValue(scannedValue);
          return;
        } else {
          // Nenhuma mensagem de qrMessage para atualizar aqui.
        }
      }
      animationFrameId = requestAnimationFrame(tick);
    }

    // Lida com o valor escaneado (chave MDF-e ou URL QR Code)
    function handleScannedValue(value) {
      let chaveMdfe = '';
      // Verifica se é uma chave de 44 dígitos diretamente
      if (value.match(/^\d{44}$/)) {
        chaveMdfe = value;
      } 
      // Verifica se é uma URL de QR Code para MDF-e contendo o parâmetro chMDFe
      else if (value.includes('chMDFe=')) {
        const urlParams = new URLSearchParams(value.split('?')[1]);
        chaveMdfe = urlParams.get('chMDFe');
      }

      if (chaveMdfe && chaveMdfe.length === 44) {
        const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chaveMdfe}&tpAmb=1`;
        
        // Abre a URL em uma nova aba.
        // Em iOS ou outros navegadores, isso ainda pode exigir que o usuário permita explicitamente o pop-up,
        // dependendo da política de segurança do navegador.
        window.open(url, '_blank');

        campoChaveMdfe.value = chaveMdfe; // Preenche o campo de entrada
        campoChaveMdfe.value = ''; // Limpa o campo de entrada após o redirecionamento bem-sucedido
        resetToInitialState(); // Retorna ao estado inicial
      } else {
        stopCamera(); // Para a câmera em caso de scan inválido
        showModal(errorModal, 'Erro na Leitura!', 'O conteúdo escaneado não é um QR Code de MDF-e reconhecido. Tente novamente.', true); // Exibe o modal de erro com opção "Tentar Novamente"
      }
    }

    // Função para parar o stream da câmera
    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      qrVideo.srcObject = null; // Limpa a fonte do vídeo
      qrVideo.pause(); // Pausa o elemento de vídeo
    }

    // Quando o usuário navega para fora ou fecha a página, para a câmera
    window.addEventListener('beforeunload', stopCamera);

  </script>
</body>
</html>
