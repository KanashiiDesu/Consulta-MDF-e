<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta MDF-e</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23004d38"/><stop offset="100%" stop-color="%23007a53"/></linearGradient></defs><path fill="url(%23grad)" d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128z"/></svg>'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #004d38, #006a4e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 10px;
    }

    .container {
      background-color: #ffffff;
      padding: 25px 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
      color: #333333;
      margin: 10px 0;
    }

    h1 {
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 1.6rem;
      color: #004d38;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .document-section {
        margin-bottom: 20px;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #e9ecef;
    }
    .document-section:last-of-type {
        margin-bottom: 0;
    }

    label {
      display: flex;
      align-items: center;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 1rem;
      text-align: left;
      color: #005a40;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 15px;
    }

    .input-wrapper .fa-key {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #007a53;
        font-size: 0.85rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 15px 10px 35px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      font-size: 0.95rem;
      color: #495057;
      background-color: #fff;
    }

    input[type="text"]:focus {
      border-color: #007a53;
      box-shadow: 0 0 0 0.2rem rgba(0, 122, 83, 0.25);
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background-color: #ffb700;
      color: #3d2800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      width: 100%;
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    button .fa-solid {
        font-size: 1em;
    }

    button:hover {
      background-color: #e6a200;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0, 0.1);
    }

    .assinatura {
      margin-top: 25px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      user-select: none;
      pointer-events: none;
      font-weight: 400;
    }

    #qr-reader {
      width: 100%;
      height: 220px;
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #qr-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .modal {
      display: none; 
      position: fixed; 
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%; 
      height: 100%; 
      overflow: auto; 
      background-color: rgba(0,0,0,0.5); 
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 350px;
      text-align: center;
      color: #333;
    }

    .modal-content h2 {
      margin-bottom: 15px;
      color: #004d38; /* Cor padrão, será sobrescrita para erros */
      font-size: 1.3rem;
    }

    .modal-content p {
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 0.9rem;
      text-align: left;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-around;
      gap: 10px;
      margin-top: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 0;
      width: auto;
      box-shadow: none;
    }
    
    .modal-buttons .confirm-btn {
      background-color: #007a53;
      color: white;
    }
    .modal-buttons .confirm-btn:hover {
      background-color: #006a4e;
    }

    .modal-buttons .cancel-btn {
      background-color: #e9ecef; /* Cinza claro para Cancelar/Voltar */
      color: #333;
    }
    .modal-buttons .cancel-btn:hover {
      background-color: #dee2e6;
    }

    /* Botão "Tentar Novamente" do errorModal do scanner usa a cor primária amarela */
    #errorModal .modal-buttons .confirm-btn { 
        background-color: #ffb700;
        color: #3d2800;
    }
    #errorModal .modal-buttons .confirm-btn:hover {
        background-color: #e6a200;
    }

    /* --- MEDIA QUERIES PARA RESPONSIVIDADE --- */
    @media (min-width: 600px) {
        body { padding: 20px; }
        .container { padding: 35px 45px; }
        h1 { font-size: 1.8rem; margin-bottom: 35px; }
        .document-section { padding: 20px; margin-bottom: 30px; }
        label { font-size: 1.05rem; margin-bottom: 12px; }
        .input-wrapper { margin-bottom: 20px; }
        .input-wrapper .fa-key { font-size: 0.9rem; left: 15px; }
        input[type="text"] { padding: 12px 15px 12px 40px; font-size: 1rem; }
        button { padding: 12px 25px; font-size: 1rem; gap: 10px; }
        button .fa-solid { font-size: 1.1em; }
        .assinatura { margin-top: 30px; font-size: 0.85rem; }
        #qr-reader { height: 250px; margin-top: 20px; }
        .modal-content { padding: 30px; }
        .modal-content h2 { font-size: 1.5rem; margin-bottom: 20px; }
        .modal-content p { font-size: 0.95rem; margin-bottom: 25px; }
        .modal-buttons { gap: 15px; }
        .modal-buttons button { padding: 10px 15px; font-size: 0.95rem; }
    }

    @media (max-width: 400px) {
        body { padding: 5px; }
        .container { padding: 20px 10px; }
        h1 { font-size: 1.4rem; margin-bottom: 20px; }
        input[type="text"] { font-size: 0.9rem; padding: 10px 10px 10px 30px; }
        .input-wrapper .fa-key { font-size: 0.8rem; left: 10px; }
        button { font-size: 0.9rem; padding: 10px 15px; }
        #qr-reader { height: 180px; }
        .modal-content { padding: 15px; width: 95%; }
        .modal-content h2 { font-size: 1.2rem; }
        .modal-content p { font-size: 0.85rem; }
        .modal-buttons { flex-direction: column; gap: 8px; }
        .modal-buttons button { width: 100%; }
    }
</style>
</head>
<body>

  <div class="container">
    <h1>Consulta MDF-e</h1>

    <div class="document-section">
      <label for="chave-mdfe">Chave do MDF-e:</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-key"></i>
        <input
          type="text"
          id="chave-mdfe"
          name="chave-mdfe"
          placeholder="Digite os 44 números da chave do MDF-e"
          maxlength="44"
          inputmode="numeric"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="consultar-mdfe"><i class="fa-solid fa-magnifying-glass"></i>Consultar MDF-e</button>
      <button id="scan-code" style="background-color: #007a53; color: #ffffff;"><i class="fa-solid fa-camera"></i>Escanear Código</button>
    </div>

    <div id="qr-reader" style="display: none;">
        <video id="qr-video" autoplay playsinline></video>
    </div>

  </div>

<div class="assinatura">
  <a href="#" id="openSocialModalLink">by Thalis Gomes</a>
</div>

  <div id="cameraPermissionModal" class="modal">
    <div class="modal-content">
      <h2 id="cameraPermTitle">Permissão da Câmera Necessária</h2>
      <p>Para escanear o código, precisamos acessar sua câmera. Por favor, clique em "Permitir" na solicitação do navegador.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="confirmCameraAccess">Entendido</button>
        <button class="cancel-btn" id="cancelCameraAccess">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="errorModal" class="modal"> <div class="modal-content">
      <h2 id="errorModalTitle">Erro na Leitura</h2>
      <p id="errorModalMessage">O conteúdo escaneado não é um código de MDF-e reconhecido.</p>
      <div class="modal-buttons">
        <button class="confirm-btn" id="tryAgainBtn">Tentar Novamente</button>
        <button class="cancel-btn" id="closeErrorModal">Voltar</button>
      </div>
    </div>
  </div>

  <div id="socialModal" class="modal">
  <div class="modal-content">
    <h2 id="socialModalTitle">Conecte-se Comigo</h2>
    <div class="social-icons-container">
      <a href="https://github.com/kanashiidesu" target="_blank" rel="noopener noreferrer" class="social-icon-link" title="GitHub">
        <i class="fab fa-github"></i> GitHub
      </a>
      <a href="https://linkedin.com/in/thalisgomes" target="_blank" rel="noopener noreferrer" class="social-icon-link" title="LinkedIn">
        <i class="fab fa-linkedin"></i> LinkedIn
      </a>
    </div>
    <div class="modal-buttons">
      <button class="secondary-ok-btn" id="closeSocialModalBtn">Fechar</button>
    </div>
  </div>
</div>

<script>
    // Funções de manipulação de input
    function somenteNumeros(event) {
      const input = event.target;
      input.value = input.value.replace(/\D/g, '');
    }

    function handlePaste(event) {
      event.preventDefault();
      const clipboardData = event.clipboardData || window.clipboardData;
      let pastedData = clipboardData.getData('text').replace(/\D/g, '');
      const input = event.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const newValue = input.value.slice(0, start) + pastedData + input.value.slice(end);
      input.value = newValue.slice(0, 44);
      const newCursorPos = Math.min(start + pastedData.length, 44);
      input.setSelectionRange(newCursorPos, newCursorPos);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    const campoChaveMdfe = document.getElementById('chave-mdfe');
    if (campoChaveMdfe) {
        campoChaveMdfe.addEventListener('input', somenteNumeros);
        campoChaveMdfe.addEventListener('paste', handlePaste);
    }

    // Elementos do Scanner e Modais
    const btnScanCode = document.getElementById('scan-code');
    const qrReaderDiv = document.getElementById('qr-reader');
    const qrVideo = document.getElementById('qr-video');

    let codeReader = null; 
    let zxingScanControls = null; 

    const cameraPermissionModal = document.getElementById('cameraPermissionModal');
    const confirmCameraAccessBtn = document.getElementById('confirmCameraAccess');
    const cancelCameraAccessBtn = document.getElementById('cancelCameraAccess');

    const errorModal = document.getElementById('errorModal');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const closeErrorModal = document.getElementById('closeErrorModal');

    // Função showModal atualizada
    function showModal(modalElement, title, message, showTryAgainButton = false, isErrorTitle = true) {
        const modalTitleElement = modalElement.querySelector('h2'); // Assume que todo modal tem um h2 para título
        const modalMessageElement = modalElement.querySelector('p'); // Assume que todo modal tem um p para mensagem

        if (modalTitleElement) {
            if (title) modalTitleElement.textContent = title;
            if (isErrorTitle) {
                modalTitleElement.style.color = '#dc3545'; // Vermelho para títulos de erro
            } else {
                modalTitleElement.style.color = '#004d38'; // Cor padrão para outros títulos (ex: permissão)
            }
        }
        if (modalMessageElement && message) modalMessageElement.innerHTML = message.replace(/\n/g, '<br>');

        const currentTryAgainBtn = modalElement.querySelector('#tryAgainBtn');
        if (modalElement === errorModal && currentTryAgainBtn) { // Lógica específica para o errorModal
            currentTryAgainBtn.style.display = showTryAgainButton ? 'flex' : 'none';
        }
        modalElement.style.display = 'flex';
    }

    function hideModal(modalElement) {
        modalElement.style.display = 'none';
        // Reseta a cor do título ao fechar, caso tenha sido alterada
        const modalTitleElement = modalElement.querySelector('h2');
        if (modalTitleElement) {
            modalTitleElement.style.color = '#004d38'; // Volta para a cor padrão do título do modal
        }
    }
    
    // Consulta manual MDF-e - AGORA USANDO MODAL PARA ERROS
    const btnConsultarMdfe = document.getElementById('consultar-mdfe');
    if (btnConsultarMdfe) {
      btnConsultarMdfe.addEventListener('click', () => {
        const input = document.getElementById('chave-mdfe');
        const chave = input.value.trim();
        if (chave.length === 44) {
          const modeloDocumento = chave.substring(20, 22);
          if (modeloDocumento === '58') {
            const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chave}&tpAmb=1`;
            window.open(url, '_blank');
            input.value = '';
          } else {
            showModal(errorModal, // Reutiliza o errorModal
                      'Chave de MDF-e Inválida', 
                      `A chave inserida (modelo ${modeloDocumento}) não é de um MDF-e (modelo 58).<br>Verifique a chave.`,
                      false, // Não mostrar "Tentar Novamente" para este tipo de erro
                      true); // Título em vermelho
            input.value = ''; 
          }
        } else {
          showModal(errorModal, // Reutiliza o errorModal
                    'Chave de MDF-e Inválida', 
                    'Por favor, insira uma chave de acesso válida com 44 números.',
                    false, // Não mostrar "Tentar Novamente"
                    true); // Título em vermelho
          input.value = ''; 
        }
      });
    }


    function resetToInitialState() {
        stopCamera();
        const docSection = campoChaveMdfe.closest('.document-section');
        if (docSection) docSection.style.display = 'block';
        
        qrReaderDiv.style.display = 'none';
        hideModal(cameraPermissionModal); // Isso vai resetar a cor do título do cameraPermissionModal
        hideModal(errorModal);         // Isso vai resetar a cor do título do errorModal
        if(campoChaveMdfe) campoChaveMdfe.value = '';
    }

    async function startCameraScan() {
        const docSection = campoChaveMdfe.closest('.document-section');
        if (docSection) docSection.style.display = 'none';

        qrReaderDiv.style.display = 'flex';
        qrVideo.style.display = 'block';

        if (typeof ZXing === 'undefined') {
            console.error("ZXing library is not loaded!");
            showModal(errorModal, "Erro Crítico", "A biblioteca de escaneamento (ZXing) não foi carregada.<br>Verifique a conexão e recarregue.", false, true);
            resetToInitialState();
            return;
        }

        if (!codeReader) {
            try {
                codeReader = new ZXing.BrowserMultiFormatReader();
            } catch (e) {
                console.error("Falha ao instanciar ZXing.BrowserMultiFormatReader():", e);
                showModal(errorModal, "Erro Crítico", "Falha ao iniciar o leitor de código: " + e.message, false, true);
                resetToInitialState();
                return;
            }
        }
        zxingScanControls = null;

        try {
            console.log('Iniciando escaneamento com ZXing...');
            codeReader.decodeFromVideoDevice(undefined, qrVideo.id, (result, error, controls) => {
                if (controls && !zxingScanControls) {
                    zxingScanControls = controls;
                }

                if (result) {
                    console.log("Código encontrado:", result.text, "Formato:", result.format.toString());
                    if (zxingScanControls) {
                        zxingScanControls.stop();
                        zxingScanControls = null;
                    }
                    handleScannedValue(result.text.trim());
                } else if (error) {
                    if (error instanceof ZXing.NotFoundException) {
                        // Normal
                    } else {
                        console.error('Erro no escaneamento ZXing:', error.name, error.message, error);
                        if (zxingScanControls) {
                            zxingScanControls.stop();
                            zxingScanControls = null;
                        }
                        let errorTitle = 'Erro de Leitura!';
                        let errorMessage = 'Ocorreu um erro ao tentar ler o código.<br>Por favor, tente novamente.';

                        if (error.name === 'NotAllowedError') {
                            errorTitle = 'Permissão Negada!';
                            errorMessage = 'Acesso à câmera negado.<br>Por favor, permita o acesso nas configurações do seu navegador.';
                        } else if (error.name === 'NotFoundError' || (error.message && error.message.toLowerCase().includes("requested device not found"))) {
                            errorTitle = 'Câmera Não Encontrada!';
                            errorMessage = 'Nenhuma câmera foi encontrada.<br>Verifique se seu dispositivo possui uma câmera funcional.';
                        } else if (error.name === 'NotReadableError' || (error.message && (error.message.toLowerCase().includes("could not start video source") || error.message.toLowerCase().includes("already in use") || error.message.toLowerCase().includes("permission denied by system")) ) ){
                            errorTitle = 'Erro de Câmera!';
                            errorMessage = 'Não foi possível acessar a câmera.<br>Pode estar em uso por outro aplicativo/aba, bloqueada pelo sistema ou não ter permissão.<br>Verifique e tente novamente.';
                        } else if (error instanceof ZXing.FormatException || error instanceof ZXing.ChecksumException) {
                            errorMessage = 'O código escaneado parece inválido ou danificado.<br>Tente alinhar melhor ou usar um código diferente.';
                        } else if (error.name === 'SecurityError' && error.message.toLowerCase().includes('secure context')) {
                            errorTitle = 'Erro de Segurança!';
                            errorMessage = 'O acesso à câmera só é permitido em um contexto seguro (HTTPS).<br>Verifique se a página está sendo acessada via https://';
                        }
                        showModal(errorModal, errorTitle, errorMessage, true, true); // showTryAgainButton = true, isErrorTitle = true
                    }
                }
            });
        } catch (initialError) {
            console.error('Erro ao iniciar o scanner ZXing (setup):', initialError);
            stopCamera();
            showModal(errorModal, 'Erro Crítico no Scanner', 'Falha ao configurar o scanner: ' + initialError.message, true, true);
            resetToInitialState();
        }
    }

    if (btnScanCode) {
        btnScanCode.addEventListener('click', async () => {
            if (typeof ZXing === 'undefined') {
                 console.error("ZXing library is not loaded before scan button click!");
                 showModal(errorModal, "Erro Crítico", "A biblioteca de escaneamento (ZXing) não foi carregada.<br>Verifique a conexão e recarregue.", false, true);
                 return;
            }
            try {
                // Renomeando o ID do título do cameraPermissionModal para evitar conflito e garantir que a cor não seja afetada por `isErrorStyle`
                const cameraPermTitle = document.getElementById('cameraPermTitle') || cameraPermissionModal.querySelector('h2');
                if(cameraPermTitle) cameraPermTitle.style.color = '#004d38'; // Garante cor padrão

                if (navigator.permissions && navigator.permissions.query) {
                    const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                    if (permissionStatus.state === 'granted') {
                        startCameraScan();
                    } else {
                         showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.<br>Por favor, clique em "Permitir" na solicitação do navegador.', false, false); // isErrorTitle = false
                    }
                } else { 
                    console.warn("navigator.permissions.query não suportado. Tentando acesso direto após modal.");
                    showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.<br>Por favor, clique em "Permitir".', false, false); // isErrorTitle = false
                }
            } catch (e) {
                console.warn("Erro ao verificar permissões da câmera, mostrando modal:", e);
                showModal(cameraPermissionModal, 'Permissão da Câmera Necessária', 'Para escanear o código, precisamos acessar sua câmera.', false, false); // isErrorTitle = false
            }
        });
    }

    confirmCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        startCameraScan();
    });

    cancelCameraAccessBtn.addEventListener('click', () => {
        hideModal(cameraPermissionModal);
        resetToInitialState();
    });

    tryAgainBtn.addEventListener('click', () => {
        hideModal(errorModal); // Isso vai resetar a cor do título do errorModal para o padrão
        startCameraScan(); 
    });

    closeErrorModal.addEventListener('click', () => {
        hideModal(errorModal); // Isso vai resetar a cor do título do errorModal para o padrão
        resetToInitialState();
    });

    function handleScannedValue(value) {
        let chaveFiscal = ''; 
        const cleanedValue = value.replace(/\s+/g, '');

        if (/^\d{44}$/.test(cleanedValue)) {
            chaveFiscal = cleanedValue;
        } else if (cleanedValue.includes('chMDFe=') || cleanedValue.includes('chCTe=') || cleanedValue.includes('chNFe=')) {
            try {
                const paramsStr = cleanedValue.includes('?') ? cleanedValue.split('?')[1] : cleanedValue;
                const urlParams = new URLSearchParams(paramsStr);
                if (urlParams.has('chMDFe')) {
                    chaveFiscal = urlParams.get('chMDFe');
                } else if (urlParams.has('chCTe')) { 
                    chaveFiscal = urlParams.get('chCTe');
                } else if (urlParams.has('chNFe')) { 
                    chaveFiscal = urlParams.get('chNFe');
                }
                if (chaveFiscal) chaveFiscal = chaveFiscal.replace(/\s+/g, '');

            } catch (e) {
                console.error("Erro ao parsear parâmetros da URL do código:", e, "Valor:", cleanedValue);
                chaveFiscal = null;
            }
        }

        if (chaveFiscal && /^\d{44}$/.test(chaveFiscal)) {
            const modeloDocumento = chaveFiscal.substring(20, 22);

            if (modeloDocumento === '58') { // Modelo 58 é MDF-e
                const url = `https://dfe-portal.svrs.rs.gov.br/mdfe/qrCode?chMDFe=${chaveFiscal}&tpAmb=1`;
                window.open(url, '_blank');
                resetToInitialState(); 
            } else { 
                let nomeDocumento = `Documento (modelo ${modeloDocumento})`;
                if(modeloDocumento === '57') nomeDocumento = 'CT-e (Conhecimento de Transporte)';
                else if(modeloDocumento === '55') nomeDocumento = 'NF-e (Nota Fiscal)';

                showModal(errorModal, // Reutiliza o errorModal
                          'Documento Não Suportado',
                          `Este é um código de ${nomeDocumento}.<br>Este consultor é específico para MDF-e (modelo 58).`,
                          true, // Mostrar "Tentar Novamente"
                          true); // Título em vermelho
            }
        } else { 
            showModal(errorModal, // Reutiliza o errorModal
                      'Código Inválido',
                      'O código lido não parece ser uma chave de acesso válida (44 dígitos) ou URL reconhecida.<br>Verifique o código e tente novamente.',
                      true, // Mostrar "Tentar Novamente"
                      true); // Título em vermelho
        }
    }

    function stopCamera() {
      if (zxingScanControls) {
        zxingScanControls.stop();
        zxingScanControls = null;
        console.log("Escaneamento ZXing interrompido via controles.");
      }
      if (codeReader) {
        try {
            codeReader.reset(); 
            console.log("Leitor ZXing resetado.");
        } catch (e) {
            console.error("Erro ao resetar o leitor ZXing:", e);
        }
      }
      if (qrVideo) {
        qrVideo.pause();
        if (qrVideo.srcObject) {
            qrVideo.srcObject.getTracks().forEach(track => track.stop());
        }
        qrVideo.srcObject = null;
      }
    }

    window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
